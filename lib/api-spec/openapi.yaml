openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Garden Table API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task operations
  - name: ai
    description: AI operations
  - name: garden
    description: Garden table reservation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, pending, completed]
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [all, low, medium, high, urgent]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /tasks/{id}/complete:
    patch:
      operationId: toggleTaskComplete
      tags: [tasks]
      summary: Toggle task completion status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found

  /tasks/stats:
    get:
      operationId: getTaskStats
      tags: [tasks]
      summary: Get task statistics
      responses:
        "200":
          description: Task statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStats"

  /tasks/recent:
    get:
      operationId: getRecentTasks
      tags: [tasks]
      summary: Get recently added or modified tasks
      responses:
        "200":
          description: Recent tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /ai/suggest-priority:
    post:
      operationId: suggestPriority
      tags: [ai]
      summary: AI-powered task priority suggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriorityRequest"
      responses:
        "200":
          description: Priority suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrioritySuggestion"

  /garden/reservations:
    get:
      operationId: listGardenReservations
      tags: [garden]
      summary: List garden reservations for a week
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD) for the Monday of the week
      responses:
        "200":
          description: List of reservations for the week
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GardenReservation"
    post:
      operationId: createGardenReservation
      tags: [garden]
      summary: Reserve the garden table for an evening
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GardenReservationInput"
      responses:
        "201":
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GardenReservation"
        "409":
          description: Date already reserved

  /garden/tokens:
    post:
      operationId: registerGardenToken
      tags: [garden]
      summary: Register or update a device push token for a flat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GardenTokenInput"
      responses:
        "204":
          description: Token registered

  /garden/reservations/{id}:
    delete:
      operationId: deleteGardenReservation
      tags: [garden]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Task:
      type: object
      required: [id, title, completed, priority, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high, urgent]
        dueDate:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
        dueDate:
          type: string
        tags:
          type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
        dueDate:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        completed:
          type: boolean

    TaskStats:
      type: object
      required: [total, completed, pending, byPriority]
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        overdue:
          type: integer
        byPriority:
          type: object
          properties:
            low:
              type: integer
            medium:
              type: integer
            high:
              type: integer
            urgent:
              type: integer
          required: [low, medium, high, urgent]

    PriorityRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string

    PrioritySuggestion:
      type: object
      required: [priority, reasoning]
      properties:
        priority:
          type: string
          enum: [low, medium, high, urgent]
        reasoning:
          type: string
        confidence:
          type: number

    GardenReservation:
      type: object
      required: [id, date, name, partySize, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        name:
          type: string
        partySize:
          type: integer
        createdAt:
          type: string

    GardenTokenInput:
      type: object
      required: [flat, token]
      properties:
        flat:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1

    GardenReservationInput:
      type: object
      required: [date, name, partySize]
      properties:
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        name:
          type: string
          minLength: 1
        partySize:
          type: integer
          minimum: 1
          maximum: 8
